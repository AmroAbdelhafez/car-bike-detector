<!DOCTYPE html>
<html>
<head>
    <title>Car & Bike Detector</title>
    <style>
        body { font-family: sans-serif; text-align: center; margin-top: 50px; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; }
        img { border: 2px solid #333; border-radius: 8px; }
    </style>
</head>
<body>
    <h1>Car & Bike Object Detection</h1>
    <form method="post" enctype="multipart/form-data">
        <input type="file" name="image" accept="image/*">
        <button type="submit">Upload and Detect</button>
    </form>

    {% if result %}
        <div class="container">
            <div>
                <h3>Detection Result:</h3>
                <img src="{{ url_for('static', filename='uploads/' + result) }}" width="500">
            </div>
        </div>
    {% endif %}
</body>
</html>
